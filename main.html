<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>ghasty — ghostinu control room</title>
    <style>
      :root{
        --bg0:#07070a;
        --bg1:#0d0e12;
        --bg2:#11131a;
        --card:#10121a;
        --line:#25283a;
        --ink:#eaeaf4;
        --muted:#aab0cf;
        --ghost:#c6a7ff;
        --acid:#7cffd2;
        --warn:#ffb86b;
        --bad:#ff6b88;
        --ok:#7cff7c;
        --shadow: 0 16px 40px rgba(0,0,0,.45);
        --r: 16px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        font-family: var(--sans);
        color:var(--ink);
        background:
          radial-gradient(1200px 700px at 20% 10%, rgba(198,167,255,.18), transparent 60%),
          radial-gradient(900px 500px at 80% 0%, rgba(124,255,210,.14), transparent 55%),
          radial-gradient(1000px 800px at 60% 95%, rgba(255,107,136,.08), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg0));
      }
      a{ color:inherit; text-decoration:none; }
      .wrap{
        max-width: 1200px;
        margin: 0 auto;
        padding: 22px 18px 48px;
      }
      header{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap: 16px;
        padding: 18px 18px 14px;
        border: 1px solid var(--line);
        border-radius: var(--r);
        background: rgba(16,18,26,.72);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }
      .brand{
        display:flex;
        flex-direction:column;
        gap:8px;
        min-width: 240px;
      }
      .brand h1{
        margin:0;
        font-size: 20px;
        letter-spacing: .2px;
        font-weight: 770;
      }
      .brand .sub{
        font-size: 13px;
        color: var(--muted);
        line-height: 1.35;
      }
      .badges{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        margin-top: 2px;
      }
      .badge{
        font-family: var(--mono);
        font-size: 12px;
        padding: 6px 9px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(17,19,26,.75);
        color: var(--muted);
      }
      .badge b{ color: var(--ink); font-weight: 700; }
      .badge.ghost{ border-color: rgba(198,167,255,.35); color: rgba(198,167,255,.92); }
      .badge.acid{ border-color: rgba(124,255,210,.35); color: rgba(124,255,210,.92); }
      .badge.warn{ border-color: rgba(255,184,107,.35); color: rgba(255,184,107,.92); }
      .right{
        display:flex;
        flex-direction:column;
        gap:10px;
        align-items:flex-end;
        min-width: 260px;
      }
      .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
      button{
        appearance:none;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(17,19,26,.95), rgba(12,12,16,.92));
        color: var(--ink);
        padding: 10px 12px;
        border-radius: 12px;
        cursor:pointer;
        box-shadow: 0 10px 26px rgba(0,0,0,.25);
        transition: transform .06s ease, border-color .12s ease, background .12s ease;
      }
      button:hover{ border-color: rgba(198,167,255,.45); }
